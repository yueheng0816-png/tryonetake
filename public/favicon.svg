<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3D3528"/>
      <stop offset="100%" stop-color="#2A2319"/>
    </linearGradient>
  </defs>
  <!-- App icon rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Camera lens ring -->
  <circle cx="32" cy="30" r="12" fill="none" stroke="white" stroke-width="2.5" opacity="0.95"/>
  <!-- Lens center dot -->
  <circle cx="32" cy="30" r="4" fill="white" opacity="0.95"/>
  <!-- Flash reflection -->
  <circle cx="28" cy="26" r="2" fill="white" opacity="0.3"/>
</svg>
